<!DOCTYPE html>
<html>
<head>
<title>Eid Greeting</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0f19;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

.card{
  max-width:700px;
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
}

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:20px;
  background:#f7d46b;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <p id="text"></p>
  <img id="img" width="200"><br>
  <button onclick="prev()">Back</button>
  <button onclick="next()">Next</button>
</div>

<audio id="audio" loop></audio>

<script>

const pages = [

/* 1–5 Eid BIG */
`Eid Mubarak 🌙
May this beautiful day bring peace, happiness and warmth into your life. May every dua you made be accepted. May Allah fill your heart with Noor and remove your worries. May your life be full of success and positivity. Stay blessed always 🤍`,

`On this special Eid 💫
May your days be filled with joy and laughter. May Allah grant you success in everything. May your heart stay peaceful and content. May you always find hope in every situation. You deserve happiness ✨`,

`Eid is a time of gratitude 🌸
It reminds us of faith and patience. May Allah forgive your mistakes and accept your prayers. May your life be filled with barakah and peace. May your journey lead to success 🤍`,

`This Eid feels special 🌙
Because of the people around us. May Allah protect you always. May your future be bright and peaceful. Keep smiling and stay strong ✨`,

`Another Eid another blessing 🌙
A chance to spread love and kindness. May your struggles turn into ease. May Allah bless your life. Stay hopeful always 🤍`,

/* 6–10 Ramadan BIG */
`Ramadan is leaving 🌙
But its lessons stay forever. May Allah accept our prayers and efforts. May we stay connected to Him. Ameen 🤍`,

`Those peaceful nights 🌌
Filled with prayer and hope. May Allah accept everything. Stay close to Him always 🤍`,

`Ramadan taught patience 🌸
Stay consistent in prayers. Keep your heart kind. May Allah guide you 🤲`,

`Carry Ramadan forward 🌙
Keep faith strong and trust Allah. He listens to every dua 🤍`,

`May we see Ramadan again 🌙
With stronger faith and better hearts. Ameen 🤍`,

/* 11 FINAL */
`Eid Mubarak 🌙
May your life be full of peace, happiness and barakah. May Allah guide and protect you always.

From: Hammad 💌
To: You and Your Family 🤍`

];

let i = 0;

function show(){
  document.getElementById("text").innerHTML = pages[i].replace(/\n/g,"<br>");
  document.getElementById("img").src = "cat"+(i+1)+".jpg";

  let audio = document.getElementById("audio");
  audio.src = i<5 ? "nasheed1.mp3" : "nasheed2.mp3";
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

function next(){
  if(i < pages.length-1){
    i++;
    show();
  }
}

function prev(){
  if(i > 0){
    i--;
    show();
  }
}

/* load first page */
show();

</script>

</body>
</html>
