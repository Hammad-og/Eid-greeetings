<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Greeting</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0d1117, #1e2530);
  color: white;
  overflow: hidden;
}

#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

button {
  padding: 10px 25px;
  border-radius: 30px;
  border: none;
  background: #f7d46b;
  color: black;
  cursor: pointer;
  margin-top: 20px;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.page {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s ease;
}

.page.active {
  opacity: 1;
  transform: translateY(0);
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 30px;
  max-width: 700px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

p {
  line-height: 1.7;
}

img {
  width: 220px;
  border-radius: 20px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div id="intro">
  <h2>Tap to begin 🌙</h2>
  <button onclick="start()">Start</button>
</div>

<audio id="audio" loop></audio>

<div id="app"></div>

<script>
const pages = [

/* 1–5 Eid */
`Eid Mubarak 🌙  
May your heart be filled with peace and warmth today.  
May every silent dua you made be accepted beautifully.  
May your life shine with happiness and positivity.  
May Allah protect you from every hardship.  
Stay blessed and keep smiling always 🤍`,

`On this beautiful Eid 💫  
May your days be filled with joy and laughter.  
May Allah grant you success in everything you do.  
May your heart always feel light and content.  
May you always find hope in every situation.  
You truly deserve happiness ✨`,

`Eid is a time of gratitude 🌸  
A moment to reflect on blessings we have.  
May Allah forgive all your past mistakes.  
May your life be filled with Noor and peace.  
May your journey ahead be full of success.  
Eid Mubarak to you and your family 🤍`,

`This Eid feels special 🌙  
Because of the people who bring joy in life.  
May Allah always keep you safe and protected.  
May your future be bright and peaceful.  
May you always find reasons to smile.  
Keep shining always ✨`,

`Another Eid, another blessing 🌙  
A chance to spread love and kindness.  
May your hardships turn into ease.  
May Allah fill your life with barakah.  
May your heart stay light and hopeful.  
Ameen 🤍`,

/* 6–10 Ramadan */
`Ramadan is leaving us 🌙  
But its peace remains in our hearts.  
The duas we made are never wasted.  
May Allah accept all our efforts.  
May we continue doing الخير always.  
Ameen 🤍`,

`Those peaceful Ramadan nights 🌌  
Filled with prayer and reflection.  
May Allah accept every moment.  
May our hearts stay connected to Him.  
May we never lose this feeling.  
Stay close to Allah 🤍`,

`Ramadan taught us patience 🌸  
And showed us what truly matters.  
May we stay consistent in our prayers.  
May our hearts stay soft and kind.  
May Allah guide us always.  
Ameen 🤲`,

`Let’s not leave Ramadan 🌙  
Let’s carry its Noor forward.  
Keep praying and trusting Allah.  
He listens to every silent dua.  
Stay strong in your faith.  
Allah is always with you 🤍`,

`May Allah invite us again 🌙  
To witness another Ramadan.  
With stronger faith and better hearts.  
May we return with sincerity.  
May we never drift away.  
Ameen 🤍`,

/* 11 Final */
`Eid Mubarak once again 🌙  
May your life be filled with peace, happiness and barakah.  
May every coming day bring you closer to success.  
May Allah always guide and protect you.  
Stay smiling and blessed always 🤍`

];

let index = 0;

function start(){
  document.getElementById("intro").style.display = "none";
  showPage();
}

function showPage(){
  const app = document.getElementById("app");

  const page = document.createElement("div");
  page.className = "page active";

  page.innerHTML = `
    <div class="card">
      <p>${pages[index]}</p>
      <img src="cat${index+1}.jpg">
      ${index < pages.length-1 ? '<button onclick="next()">Next</button>' : ''}
    </div>
  `;

  app.appendChild(page);

  const audio = document.getElementById("audio");

  if(index < 5){
    audio.src = "nasheed1.mp3";
  } else {
    audio.src = "nasheed2.mp3";
  }

  audio.play();
}

function next(){
  const pagesDOM = document.querySelectorAll(".page");
  pagesDOM[pagesDOM.length - 1].classList.remove("active");

  index++;
  showPage();
}
</script>

</body>
</html>
